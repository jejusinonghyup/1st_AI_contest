<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>제1회 제주시농협 AI 공모전 출품</title>
    <!-- Tailwind CSS (디자인용) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 파일 업로드 시 스피너 애니메이션 */
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #2563eb; /* 시원한 파란색(blue-600)으로 변경 */
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="bg-blue-50 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-2xl shadow-xl w-full max-w-3xl overflow-hidden my-8">
        <!-- 헤더 영역 -->
        <div class="bg-blue-600 p-8 text-white text-center">
            <p class="text-blue-200 text-sm font-bold mb-2 tracking-wider">AI 한 스푼, 업무는 가볍게!</p>
            <h1 class="text-3xl font-bold">🤖 제1회 제주시농협 AI 활용 공모전</h1>
            <p class="mt-3 text-blue-100 text-sm">참가 신청서</p>
        </div>

        <!-- 폼 영역 -->
        <form id="submitForm" class="p-8 space-y-8">
            
            <!-- 1. 참가자 정보 -->
            <div class="border-b border-gray-200 pb-6">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex justify-center items-center text-sm mr-2">1</span>참가자 정보</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label for="office" class="block text-sm font-medium text-gray-700">사무소명</label>
                        <input type="text" id="office" required placeholder="예: 본점" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="position" class="block text-sm font-medium text-gray-700">직명</label>
                        <input type="text" id="position" required placeholder="예: 계장" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">성명</label>
                        <input type="text" id="name" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                    </div>
                </div>
            </div>

            <!-- 2. 공모 개요 -->
            <div class="border-b border-gray-200 pb-6 space-y-5">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex justify-center items-center text-sm mr-2">2</span>공모 개요</h2>
                <div>
                    <label for="title" class="block text-sm font-medium text-gray-700">아이디어명</label>
                    <input type="text" id="title" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="aiTools" class="block text-sm font-medium text-gray-700">주요 활용 AI툴</label>
                    <input type="text" id="aiTools" required placeholder="예: ChatGPT, Claude, Midjourney 등" class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500">
                </div>
            </div>

            <!-- 3. 상세 내용 -->
            <div class="border-b border-gray-200 pb-6 space-y-5">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full inline-flex justify-center items-center text-sm mr-2">3</span>상세 내용</h2>
                <div>
                    <label for="background" class="block text-sm font-medium text-gray-700">제안 배경</label>
                    <textarea id="background" rows="3" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
                <div>
                    <label for="mainContent" class="block text-sm font-medium text-gray-700">주요 내용 및 활용 방안</label>
                    <textarea id="mainContent" rows="4" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
                <div>
                    <label for="expectedEffect" class="block text-sm font-medium text-gray-700">기대효과</label>
                    <textarea id="expectedEffect" rows="3" required class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"></textarea>
                </div>
            </div>

            <!-- 파일 첨부 -->
            <div class="border-b border-gray-200 pb-6">
                <label for="fileUpload" class="block text-sm font-medium text-gray-700">구현물/산출물 파일 첨부 <span class="text-blue-600 font-bold">(선택사항)</span></label>
                <p class="text-xs text-gray-500 mb-3 mt-1">※ 용량이 큰 경우(10MB 초과) 담당자(신용기획팀 좌동윤) 이메일(joker0715@naver.com)로 별도 제출 바랍니다.</p>
                <div class="mt-1 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-blue-500 transition-colors bg-blue-50/50">
                    <div class="space-y-1 text-center">
                        <svg class="mx-auto h-12 w-12 text-blue-300" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                            <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                        <div class="flex text-sm text-gray-600 justify-center">
                            <label for="fileUpload" class="relative cursor-pointer bg-transparent rounded-md font-medium text-blue-600 hover:text-blue-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-blue-500">
                                <span>파일 선택하기</span>
                                <input id="fileUpload" name="fileUpload" type="file" class="sr-only">
                            </label>
                            <p class="pl-1">또는 드래그 앤 드롭</p>
                        </div>
                        <p id="fileNameDisplay" class="text-xs text-gray-500 mt-2">선택된 파일 없음</p>
                    </div>
                </div>
            </div>

            <!-- 필수 확인 사항 -->
            <div class="bg-red-50 p-5 rounded-lg border border-red-100 space-y-4">
                <h3 class="text-sm font-bold text-red-600 flex items-center">
                    <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd"></path></svg>
                    제출 전 필수 확인 사항
                </h3>
                <label class="flex items-start cursor-pointer">
                    <input type="checkbox" required class="mt-1 shrink-0 text-blue-600 focus:ring-blue-500 h-5 w-5 border-gray-300 rounded">
                    <span class="ml-3 text-sm text-gray-700 leading-relaxed"><strong>[보안 준수]</strong> 아이디어 산출 및 구현 과정에서 고객의 개인정보, 금융데이터, 기타 우리농협 내부 민감정보를 외부 생성형 AI에 절대 입력하지 않았음을 확인합니다.</span>
                </label>
                <label class="flex items-start cursor-pointer">
                    <input type="checkbox" required class="mt-1 shrink-0 text-blue-600 focus:ring-blue-500 h-5 w-5 border-gray-300 rounded">
                    <span class="ml-3 text-sm text-gray-700 leading-relaxed"><strong>[활용 동의]</strong> 제출된 아이디어 및 산출물은 우리농협의 업무 효율화를 위한 자산으로 활용되는 것에 동의합니다.</span>
                </label>
            </div>

            <!-- 제출 버튼 -->
            <button type="submit" id="submitBtn" class="w-full flex justify-center items-center py-4 px-4 border border-transparent rounded-lg shadow-md text-base font-bold text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors transform hover:-translate-y-0.5">
                <span id="btnText">참가 신청서 제출하기</span>
            </button>
            
            <!-- 결과 메시지 영역 -->
            <div id="resultMessage" class="hidden text-center text-sm font-medium mt-4 p-4 rounded-lg shadow-inner"></div>
        </form>
    </div>

    <script>
        // *** 주의: GAS 배포 후 생성된 '웹 앱 URL'을 아래에 붙여넣으세요! ***
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwNiplIGkPNDkhBe63SOUJtz2kfHQCOPHBZXN6xbrifxdkQlBE431lt1dsZchYPYxIvfA/exec';

        const form = document.getElementById('submitForm');
        const fileInput = document.getElementById('fileUpload');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');
        const resultMessage = document.getElementById('resultMessage');

        // 파일 선택 시 파일명 표시 (파란색 테마 적용)
        fileInput.addEventListener('change', function(e) {
            if(e.target.files.length > 0) {
                fileNameDisplay.textContent = `선택된 파일: ${e.target.files[0].name} (${(e.target.files[0].size / 1024 / 1024).toFixed(2)} MB)`;
                fileNameDisplay.classList.add('text-blue-600', 'font-semibold');
            } else {
                fileNameDisplay.textContent = '선택된 파일 없음';
                fileNameDisplay.classList.remove('text-blue-600', 'font-semibold');
            }
        });

        // 폼 제출 이벤트
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const file = fileInput.files[0];

            // 제출 버튼 로딩 상태로 변경
            submitBtn.disabled = true;
            submitBtn.classList.replace('bg-blue-600', 'bg-gray-400');
            submitBtn.classList.replace('hover:bg-blue-700', 'hover:bg-gray-400');
            btnText.innerHTML = '<div class="loader"></div> 안전하게 제출 중... (최대 1분 소요)';
            resultMessage.classList.add('hidden');

            // 데이터를 GAS로 전송하는 공통 함수
            const sendData = (base64Data, fileName, mimeType) => {
                const payload = {
                    office: document.getElementById('office').value,
                    position: document.getElementById('position').value,
                    name: document.getElementById('name').value,
                    title: document.getElementById('title').value,
                    aiTools: document.getElementById('aiTools').value,
                    // 라디오 버튼 대신 파일 첨부 여부(file 객체 존재 유무)에 따라 자동 판별하도록 수정
                    submitType: file ? '실제 구현물 / 산출물 포함' : '아이디어 제안',
                    background: document.getElementById('background').value,
                    mainContent: document.getElementById('mainContent').value,
                    expectedEffect: document.getElementById('expectedEffect').value,
                    fileName: fileName,
                    mimeType: mimeType,
                    fileData: base64Data
                };

                fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(data => {
                    if(data.result === 'success') {
                        // 성공 처리
                        form.reset();
                        fileNameDisplay.textContent = '선택된 파일 없음';
                        fileNameDisplay.classList.remove('text-blue-600', 'font-semibold');
                        
                        resultMessage.textContent = '🎉 제출이 완료되었습니다! 참여해 주셔서 감사합니다.';
                        resultMessage.classList.replace('hidden', 'block');
                        resultMessage.className = 'block text-center text-sm font-medium mt-4 p-4 rounded-lg shadow-inner bg-blue-100 text-blue-800 border border-blue-200';
                        
                        // 화면 최상단으로 스크롤
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                    } else {
                        throw new Error(data.error || '알 수 없는 오류');
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    resultMessage.textContent = '❌ 제출 중 오류가 발생했습니다. 다시 시도해주세요.';
                    resultMessage.classList.replace('hidden', 'block');
                    resultMessage.className = 'block text-center text-sm font-medium mt-4 p-4 rounded-lg shadow-inner bg-red-100 text-red-800 border border-red-200';
                })
                .finally(() => {
                    // 버튼 상태 복구
                    submitBtn.disabled = false;
                    submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
                    submitBtn.classList.replace('hover:bg-gray-400', 'hover:bg-blue-700');
                    btnText.textContent = '참가 신청서 제출하기';
                });
            };

            // 파일이 첨부된 경우
            if (file) {
                // 10MB 크기 제한 검사
                if (file.size > 10 * 1024 * 1024) {
                    alert("파일 크기는 10MB를 초과할 수 없습니다. 담당자 이메일로 별도 제출해주세요.");
                    submitBtn.disabled = false;
                    submitBtn.classList.replace('bg-gray-400', 'bg-blue-600');
                    submitBtn.classList.replace('hover:bg-gray-400', 'hover:bg-blue-700');
                    btnText.textContent = '참가 신청서 제출하기';
                    return;
                }

                const reader = new FileReader();
                reader.onload = function(event) {
                    const base64Data = event.target.result.split(',')[1];
                    sendData(base64Data, file.name, file.type);
                };
                reader.readAsDataURL(file);
            } else {
                // 파일이 첨부되지 않은 경우 (아이디어 제안 등)
                sendData("", "", "");
            }
        });
    </script>
</body>
</html>
